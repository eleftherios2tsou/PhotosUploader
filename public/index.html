<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ανδρέας & Ελίνα</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Montserrat', sans-serif;
      background: #fdf6f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
      color: #3a3a3a;
    }

    .hero {
      text-align: center;
      max-width: 540px;
      width: 100%;
    }

    .ornament {
      font-size: 22px;
      color: #d4a0a7;
      letter-spacing: 12px;
      margin-bottom: 28px;
    }

    .names {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(52px, 12vw, 80px);
      font-weight: 300;
      color: #c0737a;
      line-height: 1.1;
      letter-spacing: 2px;
    }

    .ampersand {
      font-style: italic;
      color: #d4a0a7;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 28px 0;
      color: #d4a0a7;
      font-size: 16px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, #e8d5d7, transparent);
    }

    .welcome {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-style: italic;
      color: #888;
      line-height: 1.7;
      margin-bottom: 8px;
    }

    .welcome-sub {
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #b9a8a8;
      margin-bottom: 48px;
    }

    .btn-upload {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 16px 40px;
      background: #c0737a;
      color: #fff;
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 3px;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 50px;
      transition: background 0.2s, transform 0.15s;
    }

    .btn-upload:hover {
      background: #a85e65;
      transform: translateY(-1px);
    }

    .btn-upload svg {
      width: 18px;
      height: 18px;
    }

    .footer-note {
      margin-top: 40px;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #ccc;
    }
  </style>
</head>
<body>
  <div class="hero">
    <div class="ornament">— ✦ —</div>

    <div class="names">
      Ανδρέας<br/>
      <span class="ampersand">&amp;</span><br/>
      Ελίνα
    </div>

    <div class="divider">&#10084;</div>

    <p class="welcome">Χαρούμαστε που είστε εδώ μαζί μας<br/>την πιο ξεχωριστή μας μέρα.</p>
    <p class="welcome-sub">Μοιραστείτε τις στιγμές σας μαζί μας</p>

    <a href="/upload" class="btn-upload">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
          d="M6.827 6.175A2.31 2.31 0 015.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 00-1.134-.175 2.31 2.31 0 01-1.64-1.055l-.822-1.316a2.192 2.192 0 00-1.736-1.039 48.774 48.774 0 00-5.232 0 2.192 2.192 0 00-1.736 1.039l-.821 1.316z" />
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
          d="M16.5 12.75a4.5 4.5 0 11-9 0 4.5 4.5 0 019 0zM18.75 10.5h.008v.008h-.008V10.5z" />
      </svg>
      Ανεβάστε Φωτογραφίες
    </a>

    <p class="footer-note">Ανδρέας &amp; Ελίνα · 2025</p>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ανεβάστε Φωτογραφίες · Αντρέας & Ελίνα</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Montserrat:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Montserrat', sans-serif;
      background: #fdf6f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px;
      color: #3a3a3a;
    }

    .back-link {
      align-self: flex-start;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #b9a8a8;
      text-decoration: none;
      margin-bottom: 24px;
      transition: color 0.2s;
    }

    .back-link:hover { color: #c0737a; }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 36px 28px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      text-align: center;
    }

    .couple-names {
      font-family: 'Cormorant Garamond', serif;
      font-size: 32px;
      font-weight: 300;
      color: #c0737a;
      letter-spacing: 2px;
      margin-bottom: 4px;
    }

    .wedding-date {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 4px;
      color: #b9a8a8;
      margin-bottom: 16px;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      color: #e0b4ba;
      font-size: 18px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e8d5d7;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 24px;
      font-weight: 300;
      color: #c0737a;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 12px;
      color: #aaa;
      letter-spacing: 1px;
      margin-bottom: 28px;
      line-height: 1.6;
    }

    .action-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .btn-camera {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 20px 12px;
      background: #c0737a;
      color: #fff;
      font-family: 'Montserrat', sans-serif;
      font-size: 12px;
      letter-spacing: 1px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-camera:hover { background: #a85e65; }

    .btn-camera svg {
      width: 30px;
      height: 30px;
    }

    .drop-zone {
      border: 2px dashed #e0b4ba;
      border-radius: 12px;
      padding: 20px 12px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      background: #fff8f9;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .drop-zone:hover, .drop-zone.dragover {
      background: #fdeef0;
      border-color: #c0737a;
    }

    .drop-zone svg {
      width: 30px;
      height: 30px;
      color: #c0737a;
    }

    .drop-zone span {
      font-size: 12px;
      color: #c0737a;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .drop-zone small {
      font-size: 11px;
      color: #bbb;
    }

    #fileInput, #cameraInput { display: none; }

    #preview-container {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
      justify-content: center;
    }

    .preview-thumb {
      width: 72px;
      height: 72px;
      object-fit: cover;
      border-radius: 8px;
      border: 2px solid #e8d5d7;
    }

    .preview-count {
      font-size: 12px;
      color: #aaa;
      margin-top: 8px;
      letter-spacing: 1px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      margin-top: 20px;
      background: #c0737a;
      color: #fff;
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn:hover:not(:disabled) { background: #a85e65; }
    .btn:disabled { background: #ddd; cursor: not-allowed; }

    .progress-bar-wrap {
      display: none;
      background: #f0e0e2;
      border-radius: 8px;
      overflow: hidden;
      height: 8px;
      margin-top: 16px;
    }

    .progress-bar {
      height: 100%;
      background: #c0737a;
      width: 0%;
      transition: width 0.3s;
    }

    .status {
      margin-top: 16px;
      font-size: 13px;
      min-height: 20px;
      color: #888;
      line-height: 1.5;
    }

    .status.success { color: #5a9c6e; font-weight: 600; }
    .status.error { color: #c0484a; }
  </style>
</head>
<body>
  <a href="/" class="back-link">
    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
    </svg>
    Πίσω
  </a>

  <div class="card">
    <div class="couple-names">Αντρέας &amp; Ελίνα</div>
    <div class="wedding-date">Ο Γάμος μας</div>
    <div class="divider">&#10084;</div>
    <h1>Μοιραστείτε τις Φωτογραφίες σας</h1>
    <p class="subtitle">Βοηθήστε τον Αντρέα &amp; την Ελίνα να θυμούνται<br/>κάθε ξεχωριστή στιγμή της μέρας τους!</p>

    <div class="action-row">
      <button class="btn-camera" id="cameraBtn">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M6.827 6.175A2.31 2.31 0 015.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 00-1.134-.175 2.31 2.31 0 01-1.64-1.055l-.822-1.316a2.192 2.192 0 00-1.736-1.039 48.774 48.774 0 00-5.232 0 2.192 2.192 0 00-1.736 1.039l-.821 1.316z" />
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M16.5 12.75a4.5 4.5 0 11-9 0 4.5 4.5 0 019 0zM18.75 10.5h.008v.008h-.008V10.5z" />
        </svg>
        Τράβηξε Φωτογραφία
      </button>

      <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" />
        </svg>
        <span>Επιλογή αρχείων</span>
        <small>Μόνο εικόνες</small>
      </div>
    </div>

    <!-- VIDEO UPLOADS DISABLED: accept images only -->
    <input type="file" id="fileInput" multiple accept="image/*" />
    <input type="file" id="cameraInput" accept="image/*" capture="environment" />

    <div id="preview-container"></div>
    <p class="preview-count" id="previewCount"></p>

    <button class="btn" id="uploadBtn" disabled>Ανεβάστε Φωτογραφίες</button>

    <div class="progress-bar-wrap" id="progressWrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <p class="status" id="status"></p>
  </div>

  <script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const cameraInput = document.getElementById('cameraInput');
    const cameraBtn = document.getElementById('cameraBtn');
    const uploadBtn = document.getElementById('uploadBtn');
    const previewContainer = document.getElementById('preview-container');
    const previewCount = document.getElementById('previewCount');
    const status = document.getElementById('status');
    const progressWrap = document.getElementById('progressWrap');
    const progressBar = document.getElementById('progressBar');

    let selectedFiles = [];

    cameraBtn.addEventListener('click', () => cameraInput.click());
    fileInput.addEventListener('change', () => addFiles(fileInput.files));
    cameraInput.addEventListener('change', () => addFiles(cameraInput.files));

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      addFiles(e.dataTransfer.files);
    });

    function addFiles(files) {
      const incoming = Array.from(files);
      selectedFiles = [...selectedFiles, ...incoming];

      status.textContent = '';
      status.className = 'status';

      incoming.forEach(file => {
        if (file.type.startsWith('image/') && previewContainer.children.length < 9) {
          const img = document.createElement('img');
          img.className = 'preview-thumb';
          img.src = URL.createObjectURL(file);
          previewContainer.appendChild(img);
        }
      });

      const shown = previewContainer.children.length;
      const extra = selectedFiles.length > shown ? ` (+${selectedFiles.length - shown} ακόμα)` : '';
      previewCount.textContent = `${selectedFiles.length} αρχείο${selectedFiles.length > 1 ? ' έτοιμα' : ' έτοιμο'} για ανέβασμα${extra}`;
      uploadBtn.disabled = false;
      uploadBtn.textContent = `Ανεβάστε ${selectedFiles.length} Φωτογραφί${selectedFiles.length > 1 ? 'ες' : 'α'}`;
    }

    const CLOUD_NAME = 'deik1inux';
    const UPLOAD_PRESET = 'wedding_upload';
    // VIDEO UPLOADS DISABLED: using /image/upload rejects non-image files at Cloudinary level
    const UPLOAD_URL = `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`;

    function uploadOne(file, onProgress) {
      return new Promise((resolve, reject) => {
        const formData = new FormData();
        formData.append('file', file);
        formData.append('upload_preset', UPLOAD_PRESET);

        const xhr = new XMLHttpRequest();
        xhr.open('POST', UPLOAD_URL);
        xhr.upload.addEventListener('progress', (e) => {
          if (e.lengthComputable) onProgress(e.loaded / e.total);
        });
        xhr.addEventListener('load', () => {
          if (xhr.status === 200) resolve();
          else reject(new Error('Αποτυχία ανεβάσματος'));
        });
        xhr.addEventListener('error', () => reject(new Error('Σφάλμα δικτύου')));
        xhr.send(formData);
      });
    }

    uploadBtn.addEventListener('click', async () => {
      if (selectedFiles.length === 0) return;

      uploadBtn.disabled = true;
      progressWrap.style.display = 'block';
      progressBar.style.width = '0%';

      const total = selectedFiles.length;
      let completed = 0;
      const fileProgress = new Array(total).fill(0);

      function updateProgress() {
        const overall = fileProgress.reduce((a, b) => a + b, 0) / total;
        progressBar.style.width = Math.round(overall * 100) + '%';
        status.textContent = `Ανέβασμα ${completed} / ${total}...`;
        status.className = 'status';
      }

      updateProgress();

      try {
        await Promise.all(selectedFiles.map((file, i) =>
          uploadOne(file, (p) => { fileProgress[i] = p; updateProgress(); })
            .then(() => { completed++; fileProgress[i] = 1; updateProgress(); })
        ));

        progressBar.style.width = '100%';
        status.textContent = `Ευχαριστούμε! ${total} φωτογραφί${total > 1 ? 'ες' : 'α'} μοιράστηκ${total > 1 ? 'αν' : 'ε'} με τον Αντρέα & την Ελίνα!`;
        status.className = 'status success';
        selectedFiles = [];
        fileInput.value = '';
        cameraInput.value = '';
        previewContainer.innerHTML = '';
        previewCount.textContent = '';
        uploadBtn.textContent = 'Ανεβάστε Φωτογραφίες';

      } catch (err) {
        status.textContent = `Σφάλμα: ${err.message}`;
        status.className = 'status error';
        uploadBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
